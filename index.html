<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js — Prismatic Nebula</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    #app { position: fixed; inset: 0; }
    .hud {
      position: fixed; left: 20px; bottom: 18px; color: #e8ecff;
      letter-spacing: .08em; font-size: 12px; opacity: .82;
      text-shadow: 0 1px 8px rgba(0,0,0,.6); pointer-events: none;
    }
    .hud b { font-weight: 600; letter-spacing: .14em; }
    .hud small { display:block; opacity:.65; margin-top:4px; font-size:11px; }
    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.65) 100%);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div class="vignette"></div>
  <div class="hud">
    <b>PRISMATIC NEBULA</b>
    <small>drag to orbit · scroll to zoom · three.js r184</small>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    const container = document.getElementById('app');

    // ---- Renderer ----
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.45;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ---- Scene & Camera ----
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070d);
    scene.fog = new THREE.FogExp2(0x05070d, 0.055);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(5.2, 2.4, 7.2);

    // ---- Environment (PBR reflections) ----
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    // ---- Ground (soft reflective) ----
    const groundGeo = new THREE.CircleGeometry(40, 96);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x0a0d18, metalness: 0.85, roughness: 0.45,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.6;
    scene.add(ground);

    // ---- Central hero: Torus Knot with physical material ----
    const knotGeo = new THREE.TorusKnotGeometry(1.1, 0.34, 360, 48, 2, 3);
    const knotMat = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      metalness: 1.0,
      roughness: 0.12,
      clearcoat: 1.0,
      clearcoatRoughness: 0.08,
      iridescence: 1.0,
      iridescenceIOR: 1.35,
      iridescenceThicknessRange: [120, 520],
      envMapIntensity: 0.45,
    });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    scene.add(knot);

    // ---- Orbiting crystals ----
    const crystals = new THREE.Group();
    const crystalGeo = new THREE.OctahedronGeometry(0.28, 0);
    const crystalColors = [0x7fd8ff, 0xff7fcf, 0xc28bff, 0x90ffcf, 0xffcf7f];
    for (let i = 0; i < 18; i++) {
      const mat = new THREE.MeshPhysicalMaterial({
        color: crystalColors[i % crystalColors.length],
        metalness: 0.2,
        roughness: 0.1,
        transmission: 0.9,
        thickness: 0.6,
        ior: 1.45,
        attenuationDistance: 1.2,
        attenuationColor: new THREE.Color(crystalColors[i % crystalColors.length]).multiplyScalar(0.8),
        emissive: new THREE.Color(crystalColors[i % crystalColors.length]).multiplyScalar(0.015),
      });
      const c = new THREE.Mesh(crystalGeo, mat);
      const r = 2.6 + Math.random() * 1.6;
      const a = (i / 18) * Math.PI * 2;
      const y = (Math.random() - 0.5) * 2.4;
      c.position.set(Math.cos(a) * r, y, Math.sin(a) * r);
      c.userData = { a, r, y, spin: 0.4 + Math.random() * 0.8, phase: Math.random() * Math.PI * 2 };
      c.scale.setScalar(0.7 + Math.random() * 0.9);
      crystals.add(c);
    }
    scene.add(crystals);

    // ---- Starfield particles ----
    const starCount = 2400;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    const starCol = new Float32Array(starCount * 3);
    const tmpColor = new THREE.Color();
    for (let i = 0; i < starCount; i++) {
      const r = 18 + Math.random() * 40;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i * 3 + 1] = r * Math.cos(phi) * 0.6;
      starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      tmpColor.setHSL(0.55 + Math.random() * 0.25, 0.7, 0.55 + Math.random() * 0.3);
      starCol[i * 3] = tmpColor.r; starCol[i * 3 + 1] = tmpColor.g; starCol[i * 3 + 2] = tmpColor.b;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
    const starMat = new THREE.PointsMaterial({
      size: 0.04, sizeAttenuation: true, vertexColors: true,
      transparent: true, opacity: 0.32, depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ---- Dynamic colored lights orbiting the hero ----
    const lights = [
      new THREE.PointLight(0x4fc3ff, 5, 10, 2),
      new THREE.PointLight(0xff5ea8, 4, 10, 2),
      new THREE.PointLight(0xa78bff, 3.5, 10, 2),
    ];
    lights.forEach(l => scene.add(l));

    const key = new THREE.DirectionalLight(0xffffff, 0.15);
    key.position.set(5, 8, 6);
    scene.add(key);
    scene.add(new THREE.AmbientLight(0x6a7aff, 0.03));

    // ---- Controls ----
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 3.5;
    controls.maxDistance = 18;
    controls.maxPolarAngle = Math.PI * 0.52;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.35;
    controls.target.set(0, 0.2, 0);

    // ---- Postprocessing: Bloom + Output ----
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.18,  // strength
      0.5,   // radius
      0.8    // threshold
    );
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    // ---- Resize ----
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      composer.setSize(w, h);
    });

    // ---- Animate ----
    const clock = new THREE.Clock();
    function animate() {
      const t = clock.getElapsedTime();

      knot.rotation.x = t * 0.25;
      knot.rotation.y = t * 0.35;

      crystals.children.forEach((c) => {
        const u = c.userData;
        const a = u.a + t * 0.25;
        c.position.x = Math.cos(a) * u.r;
        c.position.z = Math.sin(a) * u.r;
        c.position.y = u.y + Math.sin(t * 0.9 + u.phase) * 0.25;
        c.rotation.x += 0.01 * u.spin;
        c.rotation.y += 0.012 * u.spin;
      });

      lights[0].position.set(Math.cos(t * 0.8) * 3.2, 1.6 + Math.sin(t * 0.6) * 0.6, Math.sin(t * 0.8) * 3.2);
      lights[1].position.set(Math.cos(t * 0.9 + 2.1) * 3.6, -0.6 + Math.cos(t * 0.5) * 0.8, Math.sin(t * 0.9 + 2.1) * 3.6);
      lights[2].position.set(Math.cos(t * 0.6 + 4.2) * 2.8, 2.4 + Math.sin(t * 0.7) * 0.4, Math.sin(t * 0.6 + 4.2) * 2.8);

      stars.rotation.y = t * 0.01;

      controls.update();
      composer.render();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
